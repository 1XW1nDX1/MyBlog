name: Daily Memory Monitor (Edge)

on:
  schedule:
    # 北京时间 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点按钮测试

permissions:
  contents: write # 必须要有写权限才能推送

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Microsoft Edge
        run: |
          # 1. 下载微软GPG公钥
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -o root -g root -m 644 microsoft.gpg /etc/apt/trusted.gpg.d/
          
          # 2. 添加软件源
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge.list'
          sudo rm microsoft.gpg
          
          # 3. 安装 Edge
          sudo apt-get update
          sudo apt-get install -y microsoft-edge-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 建议用 3.12，虽然 3.14 能跑但可能会有库兼容隐患

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas DrissionPage pyvirtualdisplay
          
          # [关键修复] 适配 Ubuntu 24.04 环境
          sudo apt-get update
          # libgconf-2-4 已被废弃，移除
          # libasound2 改名为 libasound2t64
          sudo apt-get install -y xvfb libxi6 libxrender1 libxtst6 libnss3 libasound2t64

      - name: Run Crawler Script
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}  # 把 Secret 传进去
        run: python Crawler/AutoCrawler.py

      - name: Commit and Push
        run: |
          git config --global user.name 'Haibara-Ai-Bot'
          git config --global user.email 'haibara@aptx4869.net'
          
          # 添加文件
          git add src/content/posts/memory-monitor.mdx
          git add Crawler/data_storage/
          
          # 提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Daily memory report [skip ci]" && git push)