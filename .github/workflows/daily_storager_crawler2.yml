name: Daily Memory Monitor (Playwright)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. 安装 python 库
          pip install pandas playwright
          # 2. 安装 Playwright 需要的浏览器内核 (Chromium)
          playwright install chromium
          # 3. 安装系统依赖 (如果不加这一步，Playwright 可能会缺库)
          playwright install-deps chromium

      - name: Run Crawler Script
        run: python Crawler/Daily.py

      - name: Commit and Push
        run: |
          git config --global user.name 'Haibara-Ai-Bot'
          git config --global user.email 'haibara@aptx4869.net'
          
          git add src/content/posts/memory-monitor.mdx
          git add Crawler/data_storage/
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Daily memory report [skip ci]" && git push)